<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ресторан "Шпайз"</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Ресторан "Шпайз"</h1>

  <section class="section">
    <h2>Фотогалерея страв</h2>

    <div class="photos">
      <div class="photo">Фото 1</div>
      <div class="photo">Фото 2</div>
      <div class="photo">Фото 3</div>
      <div class="photo">Фото 4</div>
      <div class="photo">Фото 5</div>
      <div class="photo">Фото 6</div>
    </div>
  </section>

  <section class="section">
    <h2>Салати</h2>

    <table>
      <tr>
        <td>Шпайз</td>
        <td class="price">360 грн</td>
      </tr>

      <tr>
        <td>Цезар</td>
        <td class="price">400 грн</td>
      </tr>

      <tr>
        <td>Грецький</td>
        <td class="price">300 грн</td>
      </tr>
    </table>
  </section>

  <section class="section">
    <h2>Перші страви</h2>

    <table>
      <tr>
        <td>Борщ український</td>
        <td class="price">300 грн</td>
      </tr>

      <tr>
        <td>Солянка</td>
        <td class="price">350 грн</td>
      </tr>
    </table>
  </section>

  <section class="section">
    <h2>Страви на мангалі</h2>

    <table>
      <tr>
        <td>Шашлик свинний</td>
        <td class="price">140 грн</td>
      </tr>

      <tr>
        <td>Шашлик курячий</td>
        <td class="price">130 грн</td>
      </tr>
    </table>
  </section>

</body>

</html>
